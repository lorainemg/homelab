services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - internal

  caddy:
    image: caddy:2.8
    container_name: caddy
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - DOMAIN_BASE=${DOMAIN_BASE}
    volumes:
      # REPO_DIR defaults to "." for plain docker compose. Portainer CE can't
      # mount relative paths from its git clone, so its stack env sets
      # REPO_DIR to the host checkout of this repo (see README).
      - ${REPO_DIR:-.}/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

networks:
  internal:
    external: true # shared with the other stacks; created by scripts/bootstrap.sh

volumes:
  caddy_data:
  caddy_config:
