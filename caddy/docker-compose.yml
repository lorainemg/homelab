services:
  # cloudflared (the tunnel this stack is published through) deliberately
  # lives in ../portainer/docker-compose.yml with the rest of the control
  # plane, so redeploying this stack can't sever CI's path to Portainer.
  caddy:
    # Built by .github/workflows/deploy.yml from ./Dockerfile (Caddyfile
    # baked in). Per-commit tags exist alongside :latest for rollbacks.
    image: ghcr.io/lorainemg/homelab/caddy:latest
    container_name: caddy
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - DOMAIN_BASE=${DOMAIN_BASE}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

networks:
  internal:
    external: true # shared with the other stacks; created by scripts/bootstrap.sh

volumes:
  caddy_data:
  caddy_config:
