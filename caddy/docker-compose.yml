services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - internal

  caddy:
    # Built by .github/workflows/deploy.yml from ./Dockerfile (Caddyfile
    # baked in). Per-commit tags exist alongside :latest for rollbacks.
    image: ghcr.io/lorainemg/homelab/caddy:latest
    container_name: caddy
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - DOMAIN_BASE=${DOMAIN_BASE}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

networks:
  internal:
    external: true # shared with the other stacks; created by scripts/bootstrap.sh

volumes:
  caddy_data:
  caddy_config:
