services:
  # The tunnel lives in this host-managed compose — not in a CI-deployed
  # stack — so a deploy can never sever the very tunnel the Portainer API
  # calls travel through. Restart it only deliberately, from the host.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:sts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - /data:/external/data
    ports:
      - 9443:9443
      - 8000:8000  # Remove if you do not intend to use Edge Agents
    environment:
      - TRUSTED_ORIGINS=portainer.sussman.win

volumes:
  portainer_data:
    name: portainer_data

networks:
  default:
    name: internal
    external: true # shared with the other stacks; created by scripts/bootstrap.sh
