services:

  # ------------------------
  # Config sync (one-shot)
  # ------------------------
  # CI bakes ./ha-config and ./mosquitto into this image; at deploy time it
  # copies them into the live config dirs on the data disk and exits. HA and
  # Mosquitto wait for it, so a config change in git restarts them with the
  # new files. Runtime state living alongside (.storage/, dbs, passwd,
  # custom_components/, ...) is never touched; every overwritten file is
  # first backed up to .sync-backup/ in the same directory.
  config-sync:
    image: ghcr.io/lorainemg/homelab/ha-config:latest
    container_name: ha-config-sync
    network_mode: "none"
    volumes:
      - ${DATA_ROOT:-/data}/home-assistant/ha-config:/config
      - ${DATA_ROOT:-/data}/mosquitto/config:/mosquitto-config
    restart: "no"

  # ------------------------
  # Config backup (live → git)
  # ------------------------
  # The reverse of config-sync: once an hour it commits UI-made edits to the
  # watched HA yaml back to this repo, with [skip ci] so a backup never
  # triggers a redeploy. Needs HOMELAB_PUSH_TOKEN (fine-grained PAT,
  # contents:write on this repo only).
  config-backup:
    image: ghcr.io/lorainemg/homelab/config-backup:latest
    container_name: ha-config-backup
    init: true # the shell loop is PID 1; without this, docker stop hangs 10s
    networks:
      - internal
    volumes:
      - ${DATA_ROOT:-/data}/home-assistant/ha-config:/live:ro
    environment:
      - HOMELAB_PUSH_TOKEN=${HOMELAB_PUSH_TOKEN}
    restart: unless-stopped

  # ------------------------
  # Home Assistant
  # ------------------------
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    networks:
      - internal
    volumes:
      # Live HA config directory (runtime state lives alongside it, so it stays
      # on the data disk; the yaml sources are versioned in ./ha-config and
      # written here by config-sync)
      - ${DATA_ROOT:-/data}/home-assistant/ha-config:/config
    ports:
      - "8123:8123" # expose HA dashboard to the LAN
    depends_on:
      config-sync:
        condition: service_completed_successfully
    restart: unless-stopped

  # ------------------------
  # Mosquitto MQTT broker
  # ------------------------
  mosquitto:
    image: eclipse-mosquitto
    container_name: mosquitto
    networks:
      - internal
    volumes:
      # Contains mosquitto.conf (versioned in ./mosquitto, written here by
      # config-sync) plus the passwd file, which is generated on the host and
      # never committed.
      - ${DATA_ROOT:-/data}/mosquitto/config:/mosquitto/config
      - ${DATA_ROOT:-/data}/mosquitto/data:/mosquitto/data
    depends_on:
      config-sync:
        condition: service_completed_successfully
    restart: unless-stopped

  # ------------------------
  # Wyoming Whisper (speech-to-text)
  # ------------------------
  whisper:
    image: rhasspy/wyoming-whisper
    container_name: whisper
    networks:
      - internal
    volumes:
      - ${DATA_ROOT:-/data}/wyoming/whisper:/data
    command: --model base-int8 --language en
    restart: unless-stopped

  # ------------------------
  # Wyoming Piper (text-to-speech)
  # ------------------------
  piper:
    image: rhasspy/wyoming-piper
    container_name: piper
    networks:
      - internal
    volumes:
      - ${DATA_ROOT:-/data}/wyoming/piper:/data
    command: --voice en_US-lessac-medium
    restart: unless-stopped

  # ------------------------
  # Ollama (local LLM)
  # ------------------------
  ollama:
    image: ollama/ollama
    container_name: ollama
    networks:
      - internal
    volumes:
      - ${DATA_ROOT:-/data}/ollama:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------
  # Ollama model pull (runs once)
  # ------------------------
  ollama-pull:
    image: ollama/ollama
    container_name: ollama-pull
    networks:
      - internal
    volumes:
      - ${DATA_ROOT:-/data}/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "llama3.2:3b"]
    restart: "no"

networks:
  internal:
    external: true
