- id: '1773875957137'
  alias: Cleaning Error
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.roborock_qrevo_pro_cleaning
    from:
    - 'off'
    to:
    - 'on'
  conditions:
  - condition: state
    entity_id: sensor.roborock_qrevo_pro_vacuum_error
    state:
    - audio_error
    - collect_dust_error_4
    - battery_error
    - bumper_stuck
    - visual_sensor
    - cannot_cross_carpet
    - charging_error
    - clear_brush_exception
    - clear_water_box_hoare
    - dirty_water_box_hoare
    - check_clean_carouse
    - collect_dust_error_3
    - filter_screen_exception
    - clear_water_box_exception
    - clean_carousel_exception
    - clean_carousel_water_full
    - cliff_sensor_error
    - dock_locator_error
    - dock
    - drain_water_exception
    - fan_error
    - filter_blocked
    - wheels_suspended
    - wheels_jammed
    - strainer_error
    - internal_error
    - invisible_wall_detected
    - lidar_blocked
    - low_battery
    - main_brush_jammed
    - no_dustbin
    - optical_flow_sensor_dirt
    - clear_brush_exception_2
    - sink_strainer_hoare
    - return_to_dock_fail
    - robot_trapped
    - side_brush_error
    - compass_error
    - temperature_protection
    - up_water_exception
    - vertical_bumper_pressed
    - vibrarise_jammed
    - wall_sensor_dirty
    - light_touch
    - mopping_roller_1
    - mopping_roller_2
    - mopping_roller_error_2
    - water_carriage_drop
    - side_brush_jammed
  - condition: state
    entity_id: sensor.roborock_qrevo_pro_dock_dock_error
    state:
    - cleaning_tank_full_or_blocked
    - dirty_tank_latch_open
    - duct_blockage
    - maintenance_brush_jammed
    - no_dustbin
    - unavailable
    - waste_water_tank_full
    - water_empty
    - unknown
  actions:
  - action: script.new_script
    metadata: {}
    data:
      title: Error
      body: "⚠️\U0001F6A8 Roborock can't continue cleaning because of an error\n-
        Vacuum: {{ state_translated('sensor.roborock_qrevo_pro_vacuum_error') }}\n-
        Dock: {{ state_translated('sensor.roborock_qrevo_pro_dock_dock_error') }}"
  mode: single
