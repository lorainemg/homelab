- id: '1773884477342'
  alias: Alerts for Todays Temp
  description: Sends Telegram alert if tomorrow's temperature exceeds threshold
  triggers:
  - at: 06:00:00
    trigger: time
  actions:
  - action: script.daily_weather_forecast_telegram
    response_variable: wf
  - variables:
      temp_high: '{{ wf.temperature }}'
      temp_low: '{{ wf.templow }}'
      precip: '{{ wf.precipitation_probability }}'
  - if:
    - condition: template
      value_template: '{{ temp_low > 75 and temp_high > 90 }}'
    then:
    - action: script.weather_tg_notify
      data:
        title: High Temperature
        body: "\U0001F975 It's going to be a really hot day today:\n- High: {{ temp_high
          }}°F\n- Low: {{ temp_low }}°F"
  - if:
    - condition: template
      value_template: '{{ temp_low < 32 or temp_high < 60 }}'
    then:
    - action: script.weather_tg_notify
      data:
        title: Low Temperature
        body: "\U0001F976 It's going to be a really cold day today:\n- High: {{ temp_high
          }}°F\n- Low: {{ temp_low }}°F"
  - if:
    - condition: template
      value_template: '{{ precip > 70 }}'
    then:
    - action: script.weather_tg_notify
      data:
        title: Rain Expected
        body: '☔️ It''s probably going to rain today:

          - Precipitation Probability: {{ precip }}%'
