new_script:
  sequence:
  - action: script.tg_notify
    metadata: {}
    data:
      device: "\U0001F9F9 Roborock"
      title: '{{ title }}'
      body: "{{ body }}\n\n\U0001F50B {{ states('sensor.roborock_qrevo_pro_battery')
        | int(0) }}% • \U0001F4CD {{ states('sensor.roborock_qrevo_pro_current_room')
        or 'Unknown' }}"
      message_thread_id: 2
  alias: Roborok Tg Notify
  description: TG Notifications Related to Roborock
  fields:
    title:
      selector:
        text:
      name: title
      description: Title of the alert
      required: true
    body:
      selector:
        text:
          multiple: false
          multiline: true
tg_notify:
  sequence:
  - action: telegram_bot.send_message
    data:
      entity_id:
      - notify.home_assistant_home_1003567301102
      message: '<b>{{ device }} • {{ title }}</b>


        {{ body }}

        '
      parse_mode: html
      message_thread_id: '{{ message_thread_id | default(2) }}'
  alias: Tg Notify
  description: Notifies TG Home Group
  fields:
    device:
      name: device
      selector:
        text:
      description: Device name that triggered the alert
      required: true
    title:
      selector:
        text:
      name: title
      description: Title of the alert
      required: true
    body:
      selector:
        text:
          multiple: false
          multiline: true
      description: Body of the alert
    message_thread_id:
      selector:
        number: {}
  icon: phu:telegram
