daily_weather_forecast_telegram:
  alias: Daily Weather Forecast
  description: Gets tomorrow's forecast and stores it
  mode: single
  sequence:
  - target:
      entity_id: weather.pirateweather
    data:
      type: daily
    response_variable: wf
    action: weather.get_forecasts
  - variables:
      tomorrow_forecast: '{{ wf[''weather.pirateweather''].forecast[0] }}'
  - stop: Done
    response_variable: tomorrow_forecast
