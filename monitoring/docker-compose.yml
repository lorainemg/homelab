services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # prometheus/ also contains secrets/ha_token (gitignored), used by
      # prometheus.yml to scrape Home Assistant. REPO_DIR defaults to "." for
      # plain docker compose; Portainer's stack env points it at the host
      # checkout of this repo (CE can't mount relative paths from its clone).
      - ${REPO_DIR:-.}/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - internal

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - internal

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
    networks:
      - internal

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${REPO_DIR:-.}/promtail:/etc/promtail
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - internal

  tempo:
    image: grafana/tempo:2.4.2
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ${REPO_DIR:-.}/tempo:/etc/tempo
      - tempo_data:/tmp/tempo
    networks:
      - internal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/otel-collector.yml"]
    volumes:
      - ${REPO_DIR:-.}/otelcol:/etc/otelcol
    networks:
      - internal
      # Joins the trakt bot's network so the collector can forward telemetry
      # to its Aspire dashboard.
      - trakt-tg-bot_aspire

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - internal

networks:
  internal:
    external: true
  trakt-tg-bot_aspire:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
