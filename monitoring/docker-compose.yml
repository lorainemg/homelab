services:
  prometheus:
    # Built by CI from ./prometheus (config baked in, HA token injected at
    # startup from the HA_TOKEN env var — see prometheus/docker-entrypoint.sh).
    image: ghcr.io/lorainemg/homelab/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      - HA_TOKEN=${HA_TOKEN:-}
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - internal

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /:/host:ro,rslave
    command:
      - '--path.rootfs=/host'
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - internal

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
    networks:
      - internal

  promtail:
    # Built by CI from ./promtail (config baked in).
    image: ghcr.io/lorainemg/homelab/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail.yml
    networks:
      - internal

  tempo:
    # Built by CI from ./tempo (config baked in).
    image: ghcr.io/lorainemg/homelab/tempo:latest
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - tempo_data:/tmp/tempo
    networks:
      - internal

  otel-collector:
    # Built by CI from ./otelcol (config baked in).
    image: ghcr.io/lorainemg/homelab/otelcol:latest
    container_name: otel_collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/otel-collector.yml"]
    networks:
      - internal
      # Joins the trakt bot's network so the collector can forward telemetry
      # to its Aspire dashboard.
      - trakt-tg-bot_aspire

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - internal

networks:
  internal:
    external: true
  trakt-tg-bot_aspire:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
