name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # deploy-everything button (fresh server, changed secrets)

permissions:
  contents: read
  packages: write

# Serialize runs: overlapping deploys of the same stacks would race in
# Portainer. Queued runs wait instead of cancelling — every push deploys.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # ha-config/mosquitto changes deploy the config stack: that's
            # where config-agent lives, and it applies them without touching
            # the HA containers (reloads via the HA API instead).
            config:
              - 'config/**'
              - 'home-assistant/ha-config/**'
              - 'home-assistant/mosquitto/**'
              - '.github/workflows/deploy.yml'
            monitoring:
              - 'monitoring/**'
              - '.github/workflows/deploy.yml'
            registry:
              - 'registry/**'
              - '.github/workflows/deploy.yml'
            immich:
              - 'immich/**'
              - '.github/workflows/deploy.yml'
            home-assistant:
              - 'home-assistant/**'
              - '!home-assistant/ha-config/**'
              - '!home-assistant/mosquitto/**'
              - '.github/workflows/deploy.yml'

  deploy:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ github.event_name == 'workflow_dispatch' && fromJSON('["config","monitoring","registry","immich","home-assistant"]') || fromJSON(needs.changes.outputs.stacks) }}
    env:
      IMAGE_BASE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      # Per-image filters so only touched configs trigger a rebuild.
      - uses: dorny/paths-filter@v3
        id: images
        with:
          filters: |
            config_agent:
              - 'config/Caddyfile'
              - 'config/config-agent/**'
              - 'home-assistant/ha-config/**'
              - 'home-assistant/mosquitto/**'
            prometheus:
              - 'monitoring/prometheus/**'
            promtail:
              - 'monitoring/promtail/**'
            tempo:
              - 'monitoring/tempo/**'
            otelcol:
              - 'monitoring/otelcol/**'

      - uses: docker/login-action@v3
        if: matrix.stack == 'config' || matrix.stack == 'monitoring'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: matrix.stack == 'config' && (github.event_name == 'workflow_dispatch' || steps.images.outputs.config_agent == 'true')
        with:
          context: .
          file: config/config-agent/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/config-agent:latest
            ${{ env.IMAGE_BASE }}/config-agent:${{ github.sha }}

      - uses: docker/build-push-action@v6
        if: matrix.stack == 'monitoring' && (github.event_name == 'workflow_dispatch' || steps.images.outputs.prometheus == 'true')
        with:
          context: monitoring/prometheus
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/prometheus:latest
            ${{ env.IMAGE_BASE }}/prometheus:${{ github.sha }}

      - uses: docker/build-push-action@v6
        if: matrix.stack == 'monitoring' && (github.event_name == 'workflow_dispatch' || steps.images.outputs.promtail == 'true')
        with:
          context: monitoring/promtail
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/promtail:latest
            ${{ env.IMAGE_BASE }}/promtail:${{ github.sha }}

      - uses: docker/build-push-action@v6
        if: matrix.stack == 'monitoring' && (github.event_name == 'workflow_dispatch' || steps.images.outputs.tempo == 'true')
        with:
          context: monitoring/tempo
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/tempo:latest
            ${{ env.IMAGE_BASE }}/tempo:${{ github.sha }}

      - uses: docker/build-push-action@v6
        if: matrix.stack == 'monitoring' && (github.event_name == 'workflow_dispatch' || steps.images.outputs.otelcol == 'true')
        with:
          context: monitoring/otelcol
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/otelcol:latest
            ${{ env.IMAGE_BASE }}/otelcol:${{ github.sha }}

      # Stack env = committed deploy.env (non-secret) + this stack's secrets.
      - name: Assemble stack env
        run: |
          case '${{ matrix.stack }}' in
            config)
              cat config/deploy.env > .stack.env
              echo 'HOMELAB_PUSH_TOKEN=${{ secrets.HOMELAB_PUSH_TOKEN }}' >> .stack.env
              echo 'HA_TOKEN=${{ secrets.HA_TOKEN }}' >> .stack.env ;;
            monitoring)
              echo 'GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}' > .stack.env
              echo 'HA_TOKEN=${{ secrets.HA_TOKEN }}' >> .stack.env ;;
            immich)
              cat immich/deploy.env > .stack.env
              echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> .stack.env ;;
            *)
              : > .stack.env ;;
          esac

      - uses: cssnr/portainer-stack-deploy-action@v1
        with:
          token: ${{ secrets.PORTAINER_API_TOKEN }}
          url: ${{ secrets.PORTAINER_URL }}
          endpoint: 3
          name: ${{ matrix.stack == 'registry' && 'docker-registry' || matrix.stack }}
          type: file
          file: ${{ matrix.stack }}/docker-compose.yml
          env_file: .stack.env
          standalone: true
          pull: true
          prune: true
