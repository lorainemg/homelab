services:
  registry:
    image: registry:2
    container_name: registry
    restart: unless-stopped
    ports:
      - 5000:5000
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_HTTP_RELATIVEURLS: "true"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - internal

volumes:
  registry-data:

networks:
  internal:
    external: true